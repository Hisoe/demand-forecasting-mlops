name: Continuous Training and Deployment

on:
  repository_dispatch:
    types: [drift_detected]
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install "setuptools<82.0.0" wheel
          pip install --no-cache-dir boto3 botocore mlflow[databricks]
          pip install -r requirements.txt
        
      - name: Pull Data (DVC)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: | 
          pip install "dvc[s3]"
          dvc pull

      - name: Debug - List files
        run: ls -R

      - name: Validate Data
        run: |
          great_expectations checkpoint run primary_checkpoint
      
      - name: Diagnostic Credential Check
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "=== CLI Authentication Debug ==="
          if [ -z "$DATABRICKS_HOST" ]; then echo "❌ DATABRICKS_HOST is completely empty!"; else echo "✅ DATABRICKS_HOST character count: ${#DATABRICKS_HOST}"; fi
          if [ -z "$DATABRICKS_TOKEN" ]; then echo "❌ DATABRICKS_TOKEN is completely empty!"; else echo "✅ DATABRICKS_TOKEN character count: ${#DATABRICKS_TOKEN}"; fi
          
          echo "=== Testing Network Handshake ==="
          curl -I -s -o /dev/null -w "HTTP Status from Host: %{http_code}\n" "$DATABRICKS_HOST/api/2.0/preview/mlflow/experiments/get-by-name"    

      - name: Train and Register Model
        env:
          # In production, use a remote MLflow server like DagsHub or a cloud VM
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          export MLFLOW_USE_DATABRICKS_SDK_MODEL_ARTIFACTS_REPO_FOR_UC="True"
          python src/train.py
        
      - name: Build Docker Container
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/demand-api:latest .
          
      - name: Push to Docker Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/demand-api:latest
